# Порт сервера
server.port=8080

# Swagger / OpenAPI
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha

spring.datasource.url=jdbc:h2:file:./data/verdikt;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA — создавать/обновлять таблицы по сущностям
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# JWT (секрет минимум 32 символа для HS256)
jwt.secret=verdikt-secret-key-minimum-32-characters-for-hs256
jwt.expiration-ms=86400000
# Cookie для JWT (HttpOnly, защита от XSS)
jwt.cookie-name=verdikt_token

# Rate limiting: ограничение попыток с одного IP (защита от брутфорса)
app.rate-limit.login.max-attempts=5
app.rate-limit.login.window-seconds=300
app.rate-limit.register.max-attempts=3
app.rate-limit.register.window-seconds=3600
# Смена подписки: макс. попыток на пользователя в окне
app.rate-limit.subscription.max-attempts=10
app.rate-limit.subscription.window-seconds=600
# Increment AI usage: макс. вызовов в минуту на пользователя (доп. к месячному лимиту)
app.rate-limit.usage-increment.max-per-minute=60

# Логи: не выводить в лог пароли, токены, ключи, зашифрованные данные и части ключей.
# Web/Security на WARN — при DEBUG могут логироваться заголовки (Authorization, Cookie).
logging.level.root=INFO
logging.level.org.springframework.web=WARN
logging.level.org.springframework.security=WARN
logging.level.org.hibernate=WARN

# Replay protection: nonce + timestamp в каждом запросе к /api/**
app.replay.enabled=true
# Разрешить запросы без X-Nonce/X-Timestamp (для Swagger UI и локальной разработки). В проде — false.
app.replay.allow-missing-headers=${ALLOW_MISSING_HEADERS:false}
app.replay.window-seconds=300

# LLM proxy: ключ и URL API (LLM_API_KEY / LLM_URL в env переопределяют значения по умолчанию)
llm.api-key=${LLM_API_KEY:sk-ayshgI6SUUplUxB0ocKzEQ1IK73mbdql}
llm.url=${LLM_URL:https://routerai.ru/api/v1/chat/completions}
llm.temperature=0.5
llm.max-tokens=2400
# Идентификаторы моделей (OpenRouter-стиль)
llm.model=x-ai/grok-4-fast
llm.rewrite_model=google/gemini-2.5-flash-lite
llm.transcription_model=google/gemini-2.5-flash-lite
# RAG query rewriter (verdikt-auto / verdikt-reasoner, не первый ход в чате)
llm.rag-query-rewrite.model=google/gemini-2.5-flash-lite
llm.vision_model=x-ai/grok-4-fast
# Multimodal: этап 1 (vision extraction), отдельно от llm.vision_model для completeMultimodalJson с явной моделью
llm.multimodal.vision_model=google/gemini-3.1-flash-lite-preview

# Отладка: сохранять body запроса /api/chat/completions в JSON (пусто = отключено)
# debug.chat-completions-path=src/main/resources/debug/chat-completions-request.json

# Отладка: сохранять planningJson multimodal-пайплайна (пусто = отключено)
debug.multimodal-planning-path=src/main/resources/debug/multimodal-planning.json

# Папка для сохранения загруженных изображений
app.images.upload-dir=./data/images
