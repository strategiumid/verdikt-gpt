<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Поддержка | Verdikt GPT</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="themes.css">
    <style>
        .legal-page {
            min-height: 100vh;
            padding: 32px 16px;
            background: radial-gradient(1200px 600px at 10% -10%, rgba(124, 58, 237, 0.2), transparent 60%),
                        radial-gradient(900px 500px at 100% 0%, rgba(59, 130, 246, 0.16), transparent 55%),
                        #07080b;
        }

        .legal-shell {
            max-width: 900px;
            margin: 0 auto;
        }

        .legal-card {
            background: rgba(18, 20, 28, 0.88);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 20px;
            padding: 28px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.35);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
        }

        h1 {
            margin: 0 0 8px;
            font-size: clamp(1.5rem, 2.4vw, 2rem);
        }

        p {
            margin: 0 0 14px;
            color: rgba(255, 255, 255, 0.88);
            line-height: 1.65;
        }

        .support-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            text-decoration: none;
            margin-bottom: 16px;
        }

        .actions {
            margin-top: 18px;
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }
    </style>
</head>
<body>
    <main class="legal-page">
        <div class="legal-shell">
            <section class="legal-card">
                <h1><i class="fas fa-life-ring"></i> Поддержка</h1>
                <p>Если у вас есть вопросы по работе приложения, приватности или подписке, напишите нам в Telegram.</p>

                <a class="ios-button support-link" href="https://t.me/tensamore" target="_blank" rel="noopener noreferrer">
                    <i class="fab fa-telegram"></i>
                    Связаться: @tensamore
                </a>

                <p>Мы стараемся отвечать максимально быстро в рабочее время.</p>

                <div class="actions">
                    <a class="ios-button secondary" href="index.html"><i class="fas fa-arrow-left"></i> Вернуться в приложение</a>
                    <a class="ios-button secondary" href="privacy.html"><i class="fas fa-shield-alt"></i> Политика конфиденциальности</a>
                </div>
            </section>
        </div>
    </main>
</body>
</html>
